site_name: pi-remote
site_description: >-
  Turn a Raspberry Pi Zero into a USB-HID keyboard + media remote (plus
  Broadlink IR) for an Android TV box, controllable over HTTP and from Home Assistant.
site_url: https://andrewadlof.github.io/pi-remote/
repo_url: https://github.com/andrewadlof/pi-remote
repo_name: andrewadlof/pi-remote

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            members_order: source
            separate_signature: true
            heading_level: 2

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - HTTP API: api.md
  - USB Gadget: usb-gadget.md
  - IR / Broadlink: ir.md
  - Remote UI: remote-ui.md
  - Live preview: preview.md
  - Home Assistant: home-assistant.md
  - Homey: homey.md
  - Reverse proxy / TLS: reverse-proxy.md
  - Troubleshooting: troubleshooting.md
  - Code reference: api-reference.md
