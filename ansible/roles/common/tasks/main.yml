---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - python3
    state: present

- name: Install ffmpeg (RTSP live-preview relay)
  ansible.builtin.apt:
    name: ffmpeg
    state: present
  when: install_ffmpeg | bool
