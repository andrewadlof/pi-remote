<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Pi Remote</title>
<style>
  :root{--bg:#111;--card:#1e1e22;--btn:#2c2c33;--btn2:#3a3a44;--acc:#4f7cff;--red:#c0392b;--txt:#eee;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,Segoe UI,Roboto,sans-serif;
       display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px;max-width:420px;margin:0 auto;}
  h1{font-size:15px;font-weight:600;opacity:.7;margin:4px 0;}
  .row{display:flex;gap:10px;width:100%;}
  button{flex:1;border:0;border-radius:14px;background:var(--btn);color:var(--txt);
         font-size:18px;padding:16px 0;font-weight:600;cursor:pointer;transition:background .08s;}
  button:active{background:var(--acc);}
  .dpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;}
  .dpad .sp{visibility:hidden;}
  .ok{background:var(--acc);}
  .sec{background:var(--btn2);}
  .pwr{background:var(--red);}
  input{flex:3;border:0;border-radius:14px;padding:14px;font-size:16px;background:var(--card);color:var(--txt);}
  .grp{width:100%;background:var(--card);padding:12px;border-radius:18px;display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.45;margin-left:4px;}
</style>
</head>
<body>
<h1>📺 Pi Keyboard Remote</h1>

<div class="grp">
  <div class="lbl">Navigation</div>
  <div class="dpad">
    <span class="sp"></span><button onclick="k('UP')">▲</button><span class="sp"></span>
    <button onclick="k('LEFT')">◀</button><button class="ok" onclick="k('ENTER')">OK</button><button onclick="k('RIGHT')">▶</button>
    <span class="sp"></span><button onclick="k('DOWN')">▼</button><span class="sp"></span>
  </div>
  <div class="row">
    <button class="sec" onclick="m('MEDIABACK')">⟲ Back</button>
    <button class="sec" onclick="m('HOME')">⌂ Home</button>
    <button class="sec" onclick="m('SEARCH')">🔍 Search</button>
  </div>
</div>

<div class="grp">
  <div class="lbl">Media</div>
  <div class="row">
    <button onclick="m('PREV')">⏮</button>
    <button onclick="m('PLAYPAUSE')">⏯</button>
    <button onclick="m('NEXT')">⏭</button>
  </div>
  <div class="row">
    <button onclick="m('VOLDOWN')">🔉 −</button>
    <button onclick="m('MUTE')">🔇</button>
    <button onclick="m('VOLUP')">🔊 +</button>
  </div>
</div>

<div class="grp">
  <div class="lbl">System</div>
  <div class="row">
    <button class="pwr" onclick="ir('power')">⏻ Power (IR)</button>
    <button class="sec" onclick="m('SLEEP')">🌙 Screen off</button>
  </div>
</div>

<div class="grp">
  <div class="lbl">Type text</div>
  <div class="row">
    <input id="t" placeholder="Type here…" autocapitalize="off" autocomplete="off" spellcheck="false">
    <button onclick="sendText()">Send</button>
  </div>
  <div class="row">
    <button class="sec" onclick="k('BACKSPACE')">⌫ Del</button>
    <button class="sec" onclick="k('SPACE')">Space</button>
    <button class="sec" onclick="k('ENTER')">⏎ Enter</button>
  </div>
</div>

<script>
  var TOKEN = new URLSearchParams(location.search).get('token') || '';
  function auth(qs){ if(!TOKEN) return qs; return qs ? qs+'&token='+encodeURIComponent(TOKEN) : 'token='+encodeURIComponent(TOKEN); }
  function hit(path, qs){ var a=auth(qs||''); fetch(path+(a?'?'+a:'')).catch(function(){}); }
  function k(n){ hit('/key','key='+n); }
  function m(n){ hit('/media','key='+n); }
  function ir(n){ hit('/ir','cmd='+n); }
  function sendText(){
    var el=document.getElementById('t'), v=el.value; if(!v) return;
    var a=auth('');
    fetch('/type'+(a?'?'+a:''),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:v})}).catch(function(){});
    el.value='';
  }
  document.getElementById('t').addEventListener('keydown',function(e){ if(e.key==='Enter') sendText(); });
</script>
</body>
</html>
