<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Pi Remote</title>
<style>
  :root{--bg:#111;--card:#1e1e22;--btn:#2c2c33;--btn2:#3a3a44;--acc:#4f7cff;--red:#c0392b;--txt:#eee;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,Segoe UI,Roboto,sans-serif;
       display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px;max-width:420px;margin:0 auto;}
  h1{font-size:15px;font-weight:600;opacity:.7;margin:4px 0;}
  .row{display:flex;gap:10px;width:100%;}
  button{flex:1;border:0;border-radius:14px;background:var(--btn);color:var(--txt);
         font-size:18px;padding:16px 0;font-weight:600;cursor:pointer;transition:background .08s;}
  button:active{background:var(--acc);}
  .dpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;}
  .dpad .sp{visibility:hidden;}
  .ok{background:var(--acc);}
  .sec{background:var(--btn2);}
  .pwr{background:var(--red);}
  input{flex:3;border:0;border-radius:14px;padding:14px;font-size:16px;background:var(--card);color:var(--txt);}
  .grp{width:100%;background:var(--card);padding:12px;border-radius:18px;display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.45;margin-left:4px;}
  video{width:100%;border-radius:14px;background:#000;aspect-ratio:16/9;}
  .note{font-size:12px;opacity:.6;min-height:15px;margin-left:4px;}
</style>
</head>
<body>
<h1>📺 Pi Keyboard Remote</h1>

<div class="grp">
  <div class="lbl">Navigation</div>
  <div class="dpad">
    <span class="sp"></span><button onclick="k('UP')">▲</button><span class="sp"></span>
    <button onclick="k('LEFT')">◀</button><button class="ok" onclick="k('ENTER')">OK</button><button onclick="k('RIGHT')">▶</button>
    <span class="sp"></span><button onclick="k('DOWN')">▼</button><span class="sp"></span>
  </div>
  <div class="row">
    <button class="sec" onclick="m('MEDIABACK')">⟲ Back</button>
    <button class="sec" onclick="m('HOME')">⌂ Home</button>
    <button class="sec" onclick="m('SEARCH')">🔍 Search</button>
  </div>
</div>

<div class="grp">
  <div class="lbl">Media</div>
  <div class="row">
    <button onclick="m('PREV')">⏮</button>
    <button onclick="m('PLAYPAUSE')">⏯</button>
    <button onclick="m('NEXT')">⏭</button>
  </div>
  <div class="row">
    <button onclick="m('VOLDOWN')">🔉 −</button>
    <button onclick="m('MUTE')">🔇</button>
    <button onclick="m('VOLUP')">🔊 +</button>
  </div>
</div>

<div class="grp">
  <div class="lbl">System</div>
  <div class="row">
    <button class="pwr" onclick="ir('power')">⏻ Power (IR)</button>
    <button class="sec" onclick="m('SLEEP')">🌙 Screen off</button>
  </div>
</div>

<div class="grp">
  <div class="lbl">Type text</div>
  <div class="row">
    <input id="t" placeholder="Type here…" autocapitalize="off" autocomplete="off" spellcheck="false">
    <button onclick="sendText()">Send</button>
  </div>
  <div class="row">
    <button class="sec" onclick="k('BACKSPACE')">⌫ Del</button>
    <button class="sec" onclick="k('SPACE')">Space</button>
    <button class="sec" onclick="k('ENTER')">⏎ Enter</button>
  </div>
</div>

<div class="grp">
  <div class="lbl">Live preview</div>
  <div class="row">
    <input id="surl" placeholder="rtsp://…  or  https://….m3u8" autocapitalize="off" autocomplete="off" spellcheck="false">
    <button onclick="loadStream()">Load</button>
    <button class="sec" onclick="loadWebrtc()" title="Low-latency via go2rtc">WebRTC</button>
  </div>
  <video id="video" controls playsinline muted></video>
  <iframe id="wrtc" allow="autoplay;fullscreen" style="display:none;width:100%;aspect-ratio:16/9;border:0;border-radius:14px;background:#000;"></iframe>
  <div class="row">
    <button class="sec" onclick="stopStream()">⏹ Stop preview</button>
  </div>
  <div id="smsg" class="note"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script>
  var TOKEN = new URLSearchParams(location.search).get('token') || '';
  function auth(qs){ if(!TOKEN) return qs; return qs ? qs+'&token='+encodeURIComponent(TOKEN) : 'token='+encodeURIComponent(TOKEN); }
  function hit(path, qs){ var a=auth(qs||''); fetch(path+(a?'?'+a:'')).catch(function(){}); }
  function k(n){ hit('/key','key='+n); }
  function m(n){ hit('/media','key='+n); }
  function ir(n){ hit('/ir','cmd='+n); }
  function sendText(){
    var el=document.getElementById('t'), v=el.value; if(!v) return;
    var a=auth('');
    fetch('/type'+(a?'?'+a:''),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:v})}).catch(function(){});
    el.value='';
  }
  document.getElementById('t').addEventListener('keydown',function(e){ if(e.key==='Enter') sendText(); });

  // ---- Live preview ----
  var hls=null, smsg=document.getElementById('smsg');
  function setMsg(t){ smsg.textContent=t||''; }
  (function(){ var s=localStorage.getItem('pi_remote_surl'); if(s) document.getElementById('surl').value=s; })();
  function destroyHls(){ if(hls){ try{hls.destroy();}catch(e){} hls=null; } }
  function playUrl(u){
    var v=document.getElementById('video'); destroyHls();
    if(/\.m3u8(\?|$)/i.test(u)){
      if(window.Hls && Hls.isSupported()){
        hls=new Hls({lowLatencyMode:true,liveSyncDuration:1.5,backBufferLength:6,manifestLoadingMaxRetry:8,manifestLoadingRetryDelay:1000,levelLoadingMaxRetry:8});
        hls.loadSource(u); hls.attachMedia(v);
        hls.on(Hls.Events.ERROR,function(_,d){ if(d.fatal) setMsg('stream error: '+d.details); });
        v.play().catch(function(){});
      } else if(v.canPlayType('application/vnd.apple.mpegurl')){
        v.src=u; v.play().catch(function(){});
      } else { setMsg('HLS not supported in this browser'); }
    } else {
      v.src=u; v.play().catch(function(){});
    }
  }
  function loadStream(){
    var u=document.getElementById('surl').value.trim();
    if(!u){ setMsg('enter a stream URL'); return; }
    showVideo();
    localStorage.setItem('pi_remote_surl', u);
    if(/^rtsps?:\/\//i.test(u)){
      setMsg('starting RTSP relay…');
      var a=auth('url='+encodeURIComponent(u));
      fetch('/stream/start'+(a?'?'+a:'')).then(function(r){ return r.json(); })
        .then(function(j){
          if(j.hls){ setMsg('relaying via ffmpeg, waiting for stream…'); waitForManifest(j.hls, 25); }
          else { setMsg('relay error: '+(j.error||'unknown')); }
        }).catch(function(){ setMsg('relay request failed'); });
    } else { setMsg(''); playUrl(u); }
  }
  function waitForManifest(url, tries){
    fetch(url, {cache:'no-store'}).then(function(r){
      if(r.ok){ setMsg('live (~3s delay)'); playUrl(url); }
      else if(tries>0){ setTimeout(function(){ waitForManifest(url, tries-1); }, 700); }
      else { setMsg('stream did not start (relay timeout) — check the URL/codec'); }
    }).catch(function(){
      if(tries>0){ setTimeout(function(){ waitForManifest(url, tries-1); }, 700); }
      else { setMsg('stream fetch failed'); }
    });
  }
  function showVideo(){ var f=document.getElementById('wrtc'); f.src='about:blank'; f.style.display='none'; document.getElementById('video').style.display=''; }
  function showFrame(src){
    destroyHls(); var v=document.getElementById('video'); try{v.pause();}catch(e){} v.removeAttribute('src'); v.load();
    v.style.display='none'; var f=document.getElementById('wrtc'); f.src=src; f.style.display='';
  }
  function loadWebrtc(){
    var u=document.getElementById('surl').value.trim();
    localStorage.setItem('pi_remote_surl', u);
    setMsg('starting WebRTC (go2rtc)…');
    var a=auth(u?('url='+encodeURIComponent(u)):'');
    fetch('/webrtc/start'+(a?'?'+a:'')).then(function(r){ return r.json(); }).then(function(j){
      if(j.embed){ setMsg('WebRTC — low latency'); showFrame(j.embed); }
      else { setMsg('webrtc error: '+(j.error||'unknown')); }
    }).catch(function(){ setMsg('webrtc request failed'); });
  }
  function stopStream(){
    destroyHls();
    var v=document.getElementById('video'); try{v.pause();}catch(e){} v.removeAttribute('src'); v.load();
    showVideo();
    var a=auth(''); fetch('/stream/stop'+(a?'?'+a:'')).catch(function(){});
    setMsg('stopped');
  }
</script>
</body>
</html>
